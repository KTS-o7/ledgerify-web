services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ledgerify
      POSTGRES_USER: ledgerify
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerify"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://ledgerify:password@postgres:5432/ledgerify?sslmode=disable"
      PORT: "8080"
      BASE_URL: "http://localhost:8080"
      JWT_SECRET: "change-me-in-production"
      SESSION_KEY: "change-me-in-production"
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:

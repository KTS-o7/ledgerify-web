version: "2"
sql:
  - engine: "postgresql"
    queries: "queries"
    schema: "schema"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_methods_with_db_argument: false
        emit_empty_slices: true
        overrides:
          - column: "public.users.password_hash"
            go_type:
              type: "string"
              pointer: false

<!DOCTYPE html>
<html lang="en" data-theme="{{.Theme}}" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Ledgerify</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <!-- Preconnect -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://unpkg.com">
    <!-- Pico.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <!-- Custom styles -->
    <link rel="stylesheet" href="/static/css/custom.css">
    <!-- htmx -->
    <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body hx-boost="true">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <div class="app-layout">
        {{template "nav.html" .}}
        <main id="main-content" class="main-content">
            <header class="page-header">
                <h1>{{.Title}}</h1>
                <div class="header-actions">
                    <div class="theme-toggle" x-data>
                        <span class="theme-option"
                              :class="document.documentElement.dataset.theme !== 'dark' && 'theme-option-active'"
                              @click="document.documentElement.dataset.theme='light'; document.cookie='theme=light;path=/;max-age=31536000;SameSite=Lax'">Light</span>
                        <span class="theme-option"
                              :class="document.documentElement.dataset.theme === 'dark' && 'theme-option-active'"
                              @click="document.documentElement.dataset.theme='dark'; document.cookie='theme=dark;path=/;max-age=31536000;SameSite=Lax'">Dark</span>
                    </div>
                </div>
            </header>

            {{if .Flashes}}
            <div class="flashes">
                {{range .Flashes}}
                <div class="flash flash-{{.Type}}">{{.Message}}</div>
                {{end}}
            </div>
            {{end}}

            <section class="page-content">
                {{template "content" .}}
            </section>
        </main>
    </div>

    <!-- Alpine theme init -->
    <script>
        document.addEventListener('alpine:init', () => {
            document.addEventListener('theme-changed', () => {
                const theme = document.documentElement.dataset.theme;
                document.cookie = 'theme=' + theme + ';path=/;max-age=31536000;SameSite=Lax';
            });
        });
    </script>
</body>
</html>

{{define "content"}}

<h2>Net Worth</h2>
<p class="muted">Track your net worth over time</p>

<div class="chart-container" style="max-width: 800px; margin: 2rem auto;">
    <canvas id="networthChart"></canvas>
</div>

{{if .Data}}
<script>
const nwData = JSON.parse({{.Data}});
new Chart(document.getElementById('networthChart'), {
    type: 'line',
    data: {
        labels: nwData.labels,
        datasets: [{
            label: 'Net Worth',
            data: nwData.balance,
            borderColor: '#10b981',
            backgroundColor: 'rgba(16, 185, 129, 0.1)',
            fill: true,
            tension: 0.3,
            pointRadius: 3,
            pointHoverRadius: 6
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false },
            tooltip: {
                callbacks: {
                    label: ctx => `Net Worth: ${parseFloat(ctx.raw).toFixed(2)}`
                }
            }
        },
        scales: {
            y: {
                ticks: { callback: v => v.toFixed(0) }
            }
        }
    }
});
</script>
{{else}}<p class="empty-state">No net worth data yet. Add accounts and transactions to start tracking.</p>{{end}}

{{end}}
